name: Web — Test, Build & Deploy

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

env:
  ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/easyinventory/web

jobs:

  # ─── Job 1: Lint + Build Check ───────────────────────
  # Runs on: every push and PR to development and main
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (validates TypeScript + catches build errors)
        run: npm run build
        env:
          VITE_API_URL: https://api.ezinventory.io
          VITE_COGNITO_REGION: us-east-2
          VITE_COGNITO_USER_POOL_ID: placeholder
          VITE_COGNITO_APP_CLIENT_ID: placeholder

  # ─── Job 2: Build Docker Image + Push to ECR ─────────
  # Runs on: push to dev or main (not PRs)
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.web \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_COGNITO_REGION=${{ secrets.VITE_COGNITO_REGION }} \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            -t $ECR_REPO:latest \
            -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

  # ─── Job 3: Deploy to EC2 ────────────────────────────
  # Runs on: push to main ONLY (not development, not PRs)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,AWS_ACCOUNT_ID,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e

            echo "=== DEPLOY DEBUG START ==="
            echo "Time (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "Shell: $SHELL"
            echo "Home: $HOME"

            cd ~/easyinventory
            echo "PWD after cd: $(pwd)"
            echo "Repo contents:"
            ls -la
            echo ".env.prod exists?"
            if [ -f .env.prod ]; then echo "yes"; else echo "no"; fi

            echo "Binary versions:"
            command -v aws && aws --version || echo "aws CLI missing"
            command -v docker && docker --version || echo "docker missing"
            command -v docker-compose && docker-compose --version || echo "docker-compose binary not found (ok if using docker compose plugin)"
            docker compose version || echo "docker compose plugin missing"

            echo "AWS env presence checks:"
            [ -n "$AWS_REGION" ] && echo "AWS_REGION set" || echo "AWS_REGION missing"
            [ -n "$AWS_ACCOUNT_ID" ] && echo "AWS_ACCOUNT_ID set" || echo "AWS_ACCOUNT_ID missing"
            [ -n "$AWS_ACCESS_KEY_ID" ] && echo "AWS_ACCESS_KEY_ID set" || echo "AWS_ACCESS_KEY_ID missing"
            [ -n "$AWS_SECRET_ACCESS_KEY" ] && echo "AWS_SECRET_ACCESS_KEY set" || echo "AWS_SECRET_ACCESS_KEY missing"

            ECR_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/easyinventory/web"
            echo "Computed ECR_REPO: $ECR_REPO"

            echo "Testing AWS caller identity..."
            aws sts get-caller-identity || true

            # Log in to ECR
            echo "Logging into ECR..."
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REPO"

            # Pull latest web image
            echo "Pulling web image via docker compose..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull web

            # Restart web container
            echo "Restarting web container..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d web

            echo "Container status (web):"
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps web || true

            # Remove dangling images
            echo "Pruning dangling images..."
            docker image prune -f
            echo "=== DEPLOY DEBUG END ==="
