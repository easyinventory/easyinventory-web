name: Web — Test, Build & Deploy

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

env:
  ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/easyinventory/web

jobs:

  # ─── Job 1: Lint + Build Check ───────────────────────
  # Runs on: every push and PR to development and main
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (validates TypeScript + catches build errors)
        run: npm run build
        env:
          VITE_API_URL: https://api.ezinventory.io
          VITE_COGNITO_REGION: us-east-2
          VITE_COGNITO_USER_POOL_ID: placeholder
          VITE_COGNITO_APP_CLIENT_ID: placeholder

  # ─── Job 2: Build Docker Image + Push to ECR ─────────
  # Runs on: push to dev or main (not PRs)
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.web \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_COGNITO_REGION=${{ secrets.VITE_COGNITO_REGION }} \
            --build-arg VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }} \
            --build-arg VITE_COGNITO_APP_CLIENT_ID=${{ secrets.VITE_COGNITO_APP_CLIENT_ID }} \
            -t $ECR_REPO:latest \
            -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}

  # ─── Job 3: Deploy to EC2 ────────────────────────────
  # Runs on: push to main ONLY (not development, not PRs)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/easyinventory
            source .env.prod

            # Log in to ECR
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REPO

            # Pull latest web image
            docker compose -f docker-compose.prod.yml pull web

            # Restart web container
            docker compose -f docker-compose.prod.yml up -d web

            # Remove dangling images
            docker image prune -f
